services:
  gateway:
    build: ./gateway
    ports:
      - "${GATEWAY_PORT:-3000}:3000"
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://tts:tts@postgres:5432/tts
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: tts-audio
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Backpressure gates, applied to job submission in this order:
      # per-user requests per minute (429 RATE_LIMITED + Retry-After),
      # per-user unfinished-job cap (429 PENDING_CAP_EXCEEDED),
      # global queue depth (503 QUEUE_FULL).
      TTS_RATE_LIMIT_PER_MINUTE: ${TTS_RATE_LIMIT_PER_MINUTE:-30}
      TTS_PENDING_CAP: ${TTS_PENDING_CAP:-10}
      TTS_QUEUE_CAPACITY: ${TTS_QUEUE_CAPACITY:-100}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  worker:
    build: ./worker
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://tts:tts@postgres:5432/tts
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: tts-audio
      # fake: instant synthetic WAVs, demonstrates the full pipeline.
      # indicf5: real inference; gated model, needs HF_TOKEN (see docs).
      TTS_ENGINE: ${TTS_ENGINE:-fake}
      TTS_DEVICE: ${TTS_DEVICE:-auto}
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      # Model weights survive container rebuilds; first indicf5 start
      # downloads ~2 GB into this volume, later starts reuse it.
      - model-cache:/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tts
      POSTGRES_PASSWORD: tts
      POSTGRES_DB: tts
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tts -d tts"]
      interval: 2s
      timeout: 3s
      retries: 15

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 3s
      retries: 15

volumes:
  pgdata:
  minio-data:
  model-cache:
